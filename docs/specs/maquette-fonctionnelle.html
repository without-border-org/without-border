<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WithoutBorder | Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            orange: '#F97316',
                            orangeHover: '#EA580C',
                            darkBg: '#0E0E11',
                            darkSidebar: '#18181B',
                            darkPanel: '#27272A',
                            darkBorder: 'rgba(255, 255, 255, 0.06)',
                            lightBg: '#FFFFFF',
                            lightSidebar: '#F4F4F5',
                            lightPanel: '#E4E4E7',
                            lightBorder: 'rgba(0, 0, 0, 0.08)'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { -webkit-font-smoothing: antialiased; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3F3F46; border-radius: 10px; }

        .transition-ui { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }

        .sidebar-right-hidden { transform: translateX(100%); width: 0; opacity: 0; pointer-events: none; }
        .sidebar-right-visible { transform: translateX(0); width: 340px; opacity: 1; }

        .nav-item-active { background: rgba(249, 115, 22, 0.1) !important; color: #F97316 !important; border-left: 3px solid #F97316; border-radius: 0 8px 8px 0; }

        .dark .glass-header { background: rgba(14, 14, 17, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.06); }
        .light .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0, 0, 0, 0.06); }

        .reaction-pill {
            display: flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.05); cursor: pointer; transition: all 0.2s;
        }
        .light .reaction-pill { border: 1px solid rgba(0, 0, 0, 0.05); background: rgba(0, 0, 0, 0.02); }
        .reaction-pill:hover { transform: scale(1.05); background: rgba(249, 115, 22, 0.1); border-color: rgba(249, 115, 22, 0.3); }

        /* Icone de traduction spécifique */
        .translate-label::before {
            content: "文";
            font-size: 10px;
            margin-right: 3px;
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden transition-colors duration-300 dark:bg-brand-darkBg bg-brand-lightBg dark:text-zinc-200 text-zinc-800">

    <!-- ==================== BARRE LATÉRALE GAUCHE ==================== -->

        <div class="h-16 flex items-center px-5 border-b dark:border-brand-darkBorder border-brand-lightBorder gap-2">

            <!-- Bouton soleil pour changer de thème -->
            <button id="theme-toggle" class="p-1.5 rounded-lg hover:bg-brand-orange/10 text-brand-orange transition-ui ml-auto" title="Changer de thème">

                </svg>

        </div>

        <div class="px-4 py-4">
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-zinc-500">

        <div class="p-4 border-t dark:border-brand-darkBorder border-brand-lightBorder">

                <img src="https://ui-avatars.com/api/?name=Sophie+Martin&background=f97316&color=fff" class="w-8 h-8 rounded-lg shadow-sm" alt="Avatar">
                <div class="flex-1 min-w-0">

    </aside>

    <!-- ==================== ZONE DE CHAT PRINCIPALE ==================== -->
    <main class="flex-1 flex flex-col relative min-w-0">

            <div class="flex items-center gap-3">

                <div>

        <div class="p-4 border-t dark:border-brand-darkBorder border-brand-lightBorder dark:bg-brand-darkBg bg-brand-lightBg">

                    <textarea id="chat-input" rows="1" class="w-full bg-transparent text-sm focus:outline-none resize-none" placeholder="Écrire un message..."></textarea>
                </div>
                <button onclick="handleSend()" class="w-10 h-10 bg-brand-orange text-white rounded-xl flex items-center justify-center shadow-lg shadow-orange-500/20 hover:bg-brand-orangeHover transition-ui active:scale-95">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>

    <!-- ==================== BARRE LATÉRALE DROITE (PARTICIPANTS) ==================== -->

                        time: '09:12', avatar: 'JC', color: 'blue', lang: 'GB',

                    {

                        reactions: [{ e: '🎨', c: 3 }, { e: '❤️', c: 2 }]

                    {
                        user: 'María García',
                        text: "Super boulot Sophie ! J'ai commencé à intégrer les tokens dans la codebase via des variables CSS custom properties. Pour les animations, je propose d'ajouter deux variables : --transition-fast à 150ms et --transition-smooth à 250ms, pour standardiser les durées à travers toute l'application. Est-ce que l'équipe valide ces valeurs avant que je les merge ?",

                        text: "Je valide la proposition de María, les durées sont cohérentes avec nos benchmarks UX. Concernant les icônes, j'ai fait une revue avec l'équipe produit et nous recommandons d'adopter Phosphor Icons comme librairie principale. Elle est plus fournie que Heroicons et sa licence MIT est compatible avec notre contexte commercial. On peut migrer progressivement.",

                    {

                        reactions: [{ e: '📅', c: 1 }]

                    {
                        user: 'John Carter',
                        text: "Salut Sophie, est-ce que tu as quelques minutes pour discuter des derniers ajustements du design ? J'ai reçu des retours client assez précis sur la taille des boutons de validation sur mobile. Certains utilisateurs sur iPhone SE trouvent la zone de tap trop petite et génèrent des erreurs de clic fréquentes.",

        // ─── Refs ──────────────────────────────────────────────────────────────────

        const dmNav        = document.getElementById('nav-dms');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput    = document.getElementById('chat-input');
        const sidebarRight = document.getElementById('sidebar-right');
        const headerIcon   = document.getElementById('header-icon');

        // ─── Thème : icône soleil toujours visible, bascule dark/light ────────────
        themeBtn.addEventListener('click', () => html.classList.toggle('dark'));

        // ─── Rendu de la navigation ────────────────────────────────────────────────
        function renderNav() {
            // Équipes — prefixe # et numéro d'ordre
            teamNav.innerHTML = state.teams.map((t, i) => {
                const isActive = state.activeChatId === t.id;
                // Badge doit correspondre au nombre de messages dans le flux
                const msgCount = (state.messages[t.id] || []).length;
                return `
                <li>
                    <button onclick="setActiveChat('${t.id}')" class="w-full flex items-center justify-between px-4 py-2 text-xs font-medium transition-ui group ${isActive ? 'nav-item-active' : 'text-zinc-500 hover:bg-zinc-200 dark:hover:bg-zinc-800 hover:text-zinc-900 dark:hover:text-zinc-200'}">
                        <div class="flex items-center gap-3 truncate">
                            <span class="opacity-40 font-bold text-[10px] w-4 text-right flex-shrink-0">#${i + 1}</span>
                            <span class="truncate">${t.name}</span>
                        </div>
                        ${msgCount > 0 ? `<span class="bg-brand-orange text-white text-[9px] px-1.5 py-0.5 rounded-full font-bold shadow-sm min-w-[18px] text-center flex-shrink-0">${msgCount}</span>` : ''}
                    </button>
                </li>`;
            }).join('');

            // Binômes — avatar coloré + indicateur de statut + rôle sous le nom
            dmNav.innerHTML = state.dms.map(d => {
                const isActive = state.activeChatId === d.id;
                const isAgentic = d.status === 'Agentic';
                const dotColor  = d.status === 'En ligne' ? 'bg-green-500'
                                : isAgentic              ? 'bg-brand-orange'
                                :                          'bg-zinc-400';
                const statusLabel = isAgentic
                    ? `<span class="text-[8px] px-1 py-0.5 bg-brand-orange/20 text-brand-orange rounded font-bold uppercase tracking-tight">${d.status}</span>`
                    : `<span class="text-[9px] opacity-60 font-medium">${d.role}</span>`;
                return `
                <li>
                    <button onclick="setActiveChat('${d.id}')" class="w-full flex items-center gap-3 px-4 py-2.5 text-xs font-medium transition-ui group ${isActive ? 'nav-item-active' : 'text-zinc-500 hover:bg-zinc-200 dark:hover:bg-zinc-800 hover:text-zinc-900 dark:hover:text-zinc-200'}">
                        <div class="relative flex-shrink-0">
                            <div class="w-8 h-8 rounded-lg bg-${d.color}-500/10 flex items-center justify-center text-[10px] font-bold text-${d.color}-500 border border-${d.color}-500/30">${d.initials}</div>
                            <div class="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 rounded-full border-2 dark:border-brand-darkSidebar border-white ${dotColor}"></div>
                        </div>
                        <div class="flex flex-col items-start min-w-0 flex-1">
                            <span class="${isActive ? 'text-brand-orange' : 'dark:text-zinc-200 text-zinc-800'} font-bold text-[11px] truncate w-full text-left">${d.name}</span>
                            ${statusLabel}
                        </div>
                    </button>
                </li>`;
            }).join('');
        }

        // ─── Rendu des messages ────────────────────────────────────────────────────
        // Ordre strict des métadonnées : Nom · Horodatage · Badge langue · Label traduction
        function renderMessages() {
            const msgs = state.messages[state.activeChatId] || [];
            chatMessages.innerHTML = msgs.map(m => {
                const needsTranslation = m.lang && m.lang !== 'FR';
                return `
                <div class="flex gap-4 group">
                    <div class="w-9 h-9 rounded-xl bg-${m.color || 'orange'}-500/10 flex items-center justify-center text-xs font-bold text-${m.color || 'orange'}-500 flex-shrink-0 shadow-sm border border-${m.color || 'orange'}-500/10">
                        ${m.avatar}
                    </div>
                    <div class="flex-1 min-w-0">
                        <!-- Métadonnées : ordre strict nom → horodatage → langue → traduction -->
                        <div class="flex items-center gap-2 mb-1.5 flex-wrap">
                            <span class="text-xs font-bold dark:text-zinc-100 text-zinc-900">${m.user}</span>
                            <span class="text-[10px] text-zinc-400 font-medium">${m.time}</span>
                            <span class="text-[9px] px-1.5 py-0.5 bg-zinc-100 dark:bg-white/10 rounded font-bold text-zinc-500 dark:text-zinc-400 border dark:border-white/5 border-zinc-200">${m.lang || 'FR'}</span>
                            ${needsTranslation ? `<span class="translate-label text-[9px] flex items-center text-brand-orange font-bold px-1.5 py-0.5 rounded-full bg-brand-orange/10">traduit</span>` : ''}
                            ${m.isAgentic ? `<span class="text-[8px] px-1.5 py-0.5 bg-brand-orange/20 text-brand-orange rounded-full font-bold uppercase tracking-tighter">Agentic</span>` : ''}
                        </div>
                        <div class="${m.isAgentic ? 'bg-brand-orange text-white shadow-lg shadow-orange-500/20' : 'dark:bg-brand-darkPanel bg-white border dark:border-brand-darkBorder border-zinc-200'} p-3.5 rounded-2xl rounded-tl-sm text-sm inline-block shadow-sm leading-relaxed max-w-2xl">
                            ${m.text}
                        </div>
                        ${m.reactions ? `
                            <div class="flex gap-1.5 mt-2 flex-wrap">
                                ${m.reactions.map(r => `<div class="reaction-pill"><span>${r.e}</span><span>${r.c}</span></div>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                </div>`;
            }).join('');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // ─── Changement de canal ───────────────────────────────────────────────────
        function setActiveChat(id) {
            state.activeChatId = id;

            let info  = state.teams.find(t => t.id === id);
            let isDM  = false;
            if (!info) {
                info  = state.dms.find(d => d.id === id);
                isDM  = true;
            }

            document.getElementById('chat-title').innerText    = info.name;
            document.getElementById('chat-subtitle').innerText = isDM ? info.role : info.subtitle;

            headerIcon.innerHTML = isDM
                ? `<div class="w-5 h-5 flex items-center justify-center font-bold text-[10px] text-brand-orange">${info.initials}</div>`
                : `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>`;

            renderNav();
            renderMessages();
        }

        // ─── Envoi d'un message ────────────────────────────────────────────────────
        function handleSend() {
            const text = chatInput.value.trim();
            if (!text) return;
            const now     = new Date();
            const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

            if (!state.messages[state.activeChatId]) state.messages[state.activeChatId] = [];

            state.messages[state.activeChatId].push({
                user:   'Sophie Martin',
                text,
                time:   timeStr,
                avatar: 'SM',
                color:  'orange',
                lang:   'FR'
            });

            chatInput.value = '';
            renderNav();
            renderMessages();
        }

        // ─── Sidebar droite ────────────────────────────────────────────────────────
        function toggleSidebarRight() {
            sidebarRight.classList.toggle('sidebar-right-hidden');
            sidebarRight.classList.toggle('sidebar-right-visible');
        }

        document.getElementById('toggle-sidebar-right').addEventListener('click', toggleSidebarRight);
        chatInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });

        // ─── Participants ──────────────────────────────────────────────────────────
        document.getElementById('participant-count').innerText = `(${state.participants.length})`;
        document.getElementById('participants-list').innerHTML = state.participants.map(p => {
            const dotColor = p.status === 'online'   ? 'bg-green-500'
                           : p.status === 'agentic'  ? 'bg-brand-orange'
                           :                            'bg-zinc-400';
            return `
            <div class="flex items-center gap-3 p-2.5 rounded-xl hover:bg-zinc-50 dark:hover:bg-white/5 cursor-pointer transition-ui group">
                <div class="relative">
                    <div class="w-9 h-9 rounded-full bg-${p.color}-500/10 flex items-center justify-center text-xs font-bold text-${p.color}-500 border border-${p.color}-500/20">${p.initials}</div>
                    <div class="absolute bottom-0 right-0 w-3 h-3 rounded-full border-2 dark:border-brand-darkSidebar border-white ${dotColor}"></div>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-xs font-bold truncate dark:text-zinc-100">${p.name}</p>
                    <p class="text-[10px] text-zinc-500 font-medium">${p.role}</p>
                </div>
                ${p.status === 'agentic' ? '<span class="text-[8px] px-1.5 py-0.5 bg-brand-orange/20 text-brand-orange rounded font-bold uppercase tracking-tight">Agentic</span>' : ''}
            </div>`;
        }).join('');

        // ─── Initialisation ────────────────────────────────────────────────────────
        setActiveChat('t1');
    </script>
</body>
</html>
